databases:
  - name: consolidatrack-db
    plan: free
    databaseName: consolidatrack
    user: consolidatrack

services:
  - type: web
    name: consolidatrack
    plan: free
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn wsgi:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: consolidatrack-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: UPLOAD_FOLDER
        value: /opt/render/project/src/uploads/photos
