{% extends "base.html" %}
{% block title %}New Invoice — ConsolidaTrack{% endblock %}
{% block content %}
<h3>New Freight Invoice</h3>
<div class="card col-md-8"><div class="card-body">
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">Container *</label>
        <select name="container_id" class="form-select" required>
          {% for c in containers %}<option value="{{ c.id }}">{{ c.container_number or c.id }} ({{ c.warehouse.code }})</option>{% endfor %}
        </select>
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label">Invoice # *</label>
        <input type="text" name="invoice_no" class="form-control" required>
      </div>
    </div>
    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">Supplier / Forwarder *</label>
        <input type="text" name="supplier" class="form-control" required>
      </div>
      <div class="col-md-3 mb-3">
        <label class="form-label">Amount *</label>
        <input type="number" name="amount" class="form-control" step="0.01" min="0.01" required>
      </div>
      <div class="col-md-3 mb-3">
        <label class="form-label">Currency</label>
        <select name="currency" class="form-select">
          <option value="USD">USD</option><option value="BRL">BRL</option><option value="CNY">CNY</option><option value="EUR">EUR</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div class="col-md-4 mb-3">
        <label class="form-label">Issue Date *</label>
        <input type="date" name="issue_date" class="form-control" required>
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label">Due Date</label>
        <input type="date" name="due_date" class="form-control">
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label">Notes</label>
      <textarea name="notes" class="form-control" rows="2"></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Create Invoice</button>
    <a href="{{ url_for('finance.invoice_list') }}" class="btn btn-secondary">Cancel</a>
  </form>
</div></div>
{% endblock %}
