{% extends "base.html" %}
{% block title %}{{ 'Edit' if user else 'New' }} User — ConsolidaTrack{% endblock %}
{% block content %}
<h3>{{ 'Edit' if user else 'New' }} User</h3>
<div class="card col-md-6">
  <div class="card-body">
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" name="full_name" class="form-control" value="{{ user.full_name if user else '' }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" value="{{ user.email if user else '' }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" {% if not user %}required{% endif %}>
      </div>
      <div class="mb-3">
        <label class="form-label">Roles</label>
        {% for r in roles %}
        <div class="form-check">
          <input type="checkbox" name="roles" value="{{ r.id }}" class="form-check-input"
                 {% if user and r in user.roles %}checked{% endif %}>
          <label class="form-check-label">{{ r.name }}</label>
        </div>
        {% endfor %}
      </div>
      <button type="submit" class="btn btn-primary">Save</button>
      <a href="{{ url_for('auth.user_list') }}" class="btn btn-secondary">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
